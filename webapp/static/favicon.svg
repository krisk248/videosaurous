<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <defs>
        <linearGradient id="egg" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#fcd34d"/>
            <stop offset="100%" stop-color="#f59e0b"/>
        </linearGradient>
    </defs>

    <!-- egg body -->
    <ellipse cx="32" cy="38" rx="20" ry="22" fill="url(#egg)"
             stroke="#78350f" stroke-width="1.5"/>

    <!-- spots -->
    <circle cx="22" cy="34" r="2.5" fill="#78350f" opacity="0.55"/>
    <circle cx="40" cy="42" r="2"   fill="#78350f" opacity="0.55"/>
    <circle cx="28" cy="50" r="2.5" fill="#78350f" opacity="0.55"/>
    <circle cx="42" cy="30" r="1.8" fill="#78350f" opacity="0.55"/>

    <!-- zigzag crack at the top of the egg -->
    <polyline points="20,18 25,12 30,18 34,12 39,18 44,12"
              fill="none" stroke="#78350f" stroke-width="2" stroke-linejoin="round"/>

    <!-- tiny green baby dino head peeking out -->
    <ellipse cx="32" cy="10" rx="5.5" ry="4.5" fill="#10b981"
             stroke="#064e3b" stroke-width="1"/>
    <circle cx="34" cy="9" r="0.9" fill="#064e3b"/>
</svg>
